# =============================================================================
# 美宜佳门店助手 — 项目内 nginx 反向代理
#
# 此文件是 envsubst 模板:容器启动时把 ${WEB_UPSTREAM_PORT} 替换成实际端口
#   dev:5173 (vite dev)
#   prod:3000 (srvx SSR)
#
# 路由:
#   /api/  → api:8787   (Express 后端)
#   /      → web:${WEB_UPSTREAM_PORT}   (TanStack Start 前端,含静态)
#
# 不做的事:
#   - 不终结 TLS(边缘 Caddy 负责)
#   - 不注入 API key(后端密钥从不走 nginx 层)
# =============================================================================

upstream api_backend {
    server api:8787;
    keepalive 16;
}

upstream web_ssr {
    server web:${WEB_UPSTREAM_PORT};
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    # 上传 / AI 响应体可能较大
    client_max_body_size 50m;

    # API 路由
    location /api/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # AI 工作流响应时长较长(Dify selection / insight 等)
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
        proxy_buffering    off;
    }

    # 前端(默认路由,SSR + 静态)
    location / {
        proxy_pass http://web_ssr;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_read_timeout 60s;
    }
}
