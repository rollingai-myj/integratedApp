upstream api_backend {
    server api:8787;
    keepalive 16;
}

upstream web_ssr {
    server web:${WEB_UPSTREAM_PORT};
    keepalive 16;
}

upstream admin_web {
    server admin-web:${ADMIN_UPSTREAM_PORT};
    keepalive 16;
}

# -----------------------------------------------------------------------------
# 移动端门店助手(原门店端)
# 端口 80,默认门店长访问入口
# -----------------------------------------------------------------------------
server {
    listen 80;
    server_name _;

    client_max_body_size 50m;

    # /api/* → Express 后端
    # SSE 用：超时覆盖最长工作流 virtual-shelf (后端 600s) + 1 分钟 buffer
    location /api/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_read_timeout 660s;
        proxy_send_timeout 660s;
        proxy_buffering    off;
    }

    # 其他路径: 先查静态文件, 未命中走 SSR
    location / {
        root /var/www/static;
        try_files $uri @ssr;
    }

    location @ssr {
        proxy_pass http://web_ssr;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_read_timeout 60s;
    }
}

# -----------------------------------------------------------------------------
# PC 端超管控制台(新增)
# 端口 81,通过宿主机 ${ADMIN_PORT} 或独立域名暴露
# 跟移动端共用同一组 /api/* 后端 + session cookie
# -----------------------------------------------------------------------------
server {
    listen 81;
    server_name _;

    client_max_body_size 50m;

    location /api/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_read_timeout 660s;
        proxy_send_timeout 660s;
        proxy_buffering    off;
    }

    # admin-web 是纯客户端 SPA(Vite dev / 生产 vite build 静态产物),
    # 没有 SSR,所有路径都打到 admin-web 容器(Vite dev 自己处理 SPA fallback)
    location / {
        proxy_pass http://admin_web;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_read_timeout 60s;
    }
}
