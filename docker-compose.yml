services:
  postgres:
    image: postgres:16-alpine
    container_name: myj-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: myj_dev
      POSTGRES_USER: myj
      POSTGRES_PASSWORD: myj
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U myj -d myj_dev']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
    name: myj_postgres_data
