version: '3.9'

# 竞品采集模块本地开发用 Postgres
#
# 端口选 5436，避开主项目的 5435，方便同时运行
# 如果你的本地这两个端口都被占了，自由调整。

services:
  postgres:
    image: postgres:16-alpine
    container_name: myj-competitor-pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: myj_competitor_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5436:5432'
    volumes:
      - competitor_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  competitor_pgdata:
