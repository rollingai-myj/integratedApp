<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>货盘选品助手 · 重构原型</title>
<style>
  * { -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: #e9e4dc;
    color: #1A1714;
    overflow: hidden;
  }
  /* 移动视口：手机上全屏，桌面预览时居中限宽 */
  #frame {
    position: relative;
    margin: 0 auto;
    max-width: 430px;
    height: 100dvh;
    background: #FAF7F2;
    overflow: hidden;
  }
  @media (min-width: 460px) {
    #frame { box-shadow: 0 0 0 1px rgba(0,0,0,0.08), 0 18px 60px rgba(0,0,0,0.18); }
  }
  #root { position: absolute; inset: 0; }
  button { touch-action: manipulation; }
  textarea::placeholder, input::placeholder { color: #b9b1a6; }

  @keyframes shv-spin { to { transform: rotate(360deg); } }
  @keyframes shv-scan { 0% { top: -34%; } 100% { top: 100%; } }
  @keyframes shv-fadein { from { opacity: 0; } to { opacity: 1; } }
  @keyframes shv-pop { from { transform: scale(0.4); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  @keyframes shv-screen-in { from { opacity: 0.4; transform: translateX(14px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes shv-progress { 0% { margin-left: -40%; } 100% { margin-left: 100%; } }
  @keyframes shv-dot { 0%, 80%, 100% { opacity: 0.25; } 40% { opacity: 1; } }
  @keyframes shv-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
  @keyframes shv-card-in { from { opacity: 0; transform: translateX(26px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes shv-sheet-up { from { transform: translateY(40%); } to { transform: translateY(0); } }

  /* 加载占位 */
  #boot {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 12px; color: #9A9189; font-size: 13px;
  }
  #boot .dot {
    width: 34px; height: 34px; border-radius: 50%;
    border: 3px solid rgba(225,29,42,0.15); border-top-color: #E11D2A;
    animation: shv-spin 0.8s linear infinite;
  }
</style>
</head>
<body>
<div id="frame">
  <div id="root"><div id="boot"><div class="dot"></div>正在加载原型…</div></div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="shelves-app/ui.jsx"></script>
<script type="text/babel" src="shelves-app/data.jsx"></script>
<script type="text/babel" src="shelves-app/store.jsx"></script>
<script type="text/babel" src="shelves-app/product.jsx"></script>
<script type="text/babel" src="shelves-app/screens-home.jsx"></script>
<script type="text/babel" src="shelves-app/screens-qa.jsx"></script>
<script type="text/babel" src="shelves-app/screens-flow.jsx"></script>
<script type="text/babel" src="shelves-app/screens-secondary.jsx"></script>
<script type="text/babel" src="shelves-app/app.jsx"></script>
</body>
</html>
